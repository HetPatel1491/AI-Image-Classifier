<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Vision Classifier</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 400px; text-align: center; }
        .preview-box { width: 100%; height: 250px; border: 2px dashed #d1d8e0; border-radius: 16px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; background: #fbfbfb; overflow: hidden; }
        #previewImg { max-width: 100%; max-height: 100%; display: none; object-fit: contain; }
        .btn-upload { background: #007bff; color: white; padding: 12px; border-radius: 12px; cursor: pointer; display: block; margin-bottom: 10px; font-weight: 600; }
        button { background: #28a745; color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #ccc; }
        #result { margin-top: 20px; font-weight: 600; color: #333; padding: 15px; background: #f8f9fa; border-radius: 12px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>AI Image Vision</h2>
        <div class="preview-box">
            <img src="" id="previewImg">
            <span id="placeholder">No Image Selected</span>
        </div>
        <label class="btn-upload">
            <input type="file" id="fileInput" accept="image/*" onchange="showPreview(event)">
            Choose Photo
        </label>
        <button id="goBtn" onclick="analyze()" disabled>Identify Object</button>
        <div id="result">Ready for analysis...</div>
    </div>

    <script>
        function showPreview(event) {
            const reader = new FileReader();
            reader.onload = () => {
                const img = document.getElementById('previewImg');
                img.src = reader.result;
                img.style.display = 'block';
                document.getElementById('placeholder').style.display = 'none';
                document.getElementById('goBtn').disabled = false;
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        async function analyze() {
            const file = document.getElementById('fileInput').files[0];
            const resultDiv = document.getElementById('result');
            resultDiv.innerText = "🔍 Analyzing...";
            
            const formData = new FormData();
            formData.append('file', file);

            const response = await fetch('/predict', { method: 'POST', body: formData });
            const data = await response.json();
            resultDiv.innerText = data.result;
        }
    </script>
</body>
</html>
